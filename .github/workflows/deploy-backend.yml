name: Deploy Backend Lambdas

on:
  push:
    branches:
      - main
      - 'v1.10-*'
    paths:
      - 'backend-lambdas/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-gov-west-1
  AWS_ROLE_ARN: arn:aws-us-gov:iam::615978631048:role/github-actions-backend-deploy

jobs:
  deploy:
    name: Deploy Backend Lambdas
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]')"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: github-actions-backend-${{ github.run_id }}

      - name: Verify AWS identity
        run: aws sts get-caller-identity

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Check for backend-lambdas directory
        id: check_lambdas
        run: |
          if [ -d "backend-lambdas" ] && [ -d "backend-lambdas/_shared" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Package and deploy each Lambda
        if: steps.check_lambdas.outputs.exists == 'true'
        run: |
          set -e
          SHARED_DIR="${GITHUB_WORKSPACE}/backend-lambdas/_shared"
          
          # Verify _shared has expected files BEFORE looping
          echo "Verifying _shared/ contents:"
          ls -la "$SHARED_DIR"
          for required in cognito_client.py cookies.py jwt_verifier.py responses.py; do
            if [ ! -f "$SHARED_DIR/$required" ]; then
              echo "ERROR: $required missing from _shared/"
              exit 1
            fi
          done
          echo "All 4 _shared files present"
          
          cd "${GITHUB_WORKSPACE}/backend-lambdas"
          
          for lambda_dir in */; do
            lambda_dir_clean="${lambda_dir%/}"
            
            if [ "$lambda_dir_clean" = "_shared" ]; then
              echo "Skipping _shared (utility directory)"
              continue
            fi
            
            lambda_name="bis3-defense-${lambda_dir_clean}"
            echo "::group::Deploying $lambda_name"
            
            BUILD_DIR=$(mktemp -d)
            echo "Build dir: $BUILD_DIR"
            
            # Copy Lambda's own files
            cp -r "${GITHUB_WORKSPACE}/backend-lambdas/${lambda_dir_clean}/"* "$BUILD_DIR/"
            
            # Copy _shared/*.py files (use absolute paths to avoid any cwd confusion)
            cp "$SHARED_DIR"/*.py "$BUILD_DIR/"
            
            # Verify shared files copied
            echo "Build dir contents after copy:"
            ls -la "$BUILD_DIR/"
            
            if [ ! -f "$BUILD_DIR/cognito_client.py" ]; then
              echo "ERROR: cognito_client.py not in build dir"
              exit 1
            fi
            
            cd "$BUILD_DIR"
            
            # Install dependencies if requirements.txt has actual deps
            if [ -f requirements.txt ] && grep -v '^#' requirements.txt | grep -v '^$' | head -1 > /dev/null; then
              echo "Installing dependencies for $lambda_name"
              pip install -r requirements.txt -t . --quiet
            else
              echo "No external dependencies for $lambda_name"
            fi
            
            ZIP_PATH="${GITHUB_WORKSPACE}/backend-lambdas/${lambda_name}.zip"
            zip -rq "$ZIP_PATH" . -x "*.pyc" -x "__pycache__/*" -x "*/__pycache__/*"
            
            cd "${GITHUB_WORKSPACE}/backend-lambdas"
            ls -lh "$ZIP_PATH" | awk '{print "Package size: " $5}'
            
            aws lambda update-function-code \
              --function-name "$lambda_name" \
              --zip-file "fileb://$ZIP_PATH" \
              --publish \
              --region ${{ env.AWS_REGION }} \
              --no-cli-pager \
              > /tmp/lambda-update.json
            
            NEW_VERSION=$(jq -r '.Version' /tmp/lambda-update.json)
            echo "Published version $NEW_VERSION for $lambda_name"
            
            if aws lambda get-alias --function-name "$lambda_name" --name live --region ${{ env.AWS_REGION }} --no-cli-pager 2>/dev/null > /dev/null; then
              aws lambda update-alias --function-name "$lambda_name" --name live --function-version "$NEW_VERSION" --region ${{ env.AWS_REGION }} --no-cli-pager > /dev/null
              echo "Updated 'live' alias to version $NEW_VERSION"
            else
              aws lambda create-alias --function-name "$lambda_name" --name live --function-version "$NEW_VERSION" --region ${{ env.AWS_REGION }} --no-cli-pager > /dev/null
              echo "Created 'live' alias pointing to version $NEW_VERSION"
            fi
            
            rm -rf "$BUILD_DIR"
            echo "::endgroup::"
          done

      - name: Deployment summary
        if: steps.check_lambdas.outputs.exists == 'true'
        run: |
          echo "## Backend Lambda Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "Deployed at $(date -u) by ${{ github.actor }} from commit ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY

      - name: No-op summary
        if: steps.check_lambdas.outputs.exists == 'false'
        run: |
          echo "## No Backend Lambdas Deployed" >> $GITHUB_STEP_SUMMARY
